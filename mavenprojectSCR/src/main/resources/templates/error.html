<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Custom Error Page</title>
</head>
<body>
    <h1>Oops! Something went wrong.</h1>
    <h2 th:text="${status} + ' ' + ${error}"></h2>
    
    <!-- Display stack trace if available -->
    <div th:if="${trace}">
        <h3>Stack Trace:</h3>
        <pre th:text="${trace}"></pre>
    </div>
</body>
</html>
